# ==========================================
# GitLab Pages 自動部署設定
# QA 工具中心
# ==========================================
# 使用說明：
# 1. 將此檔案放在 repo 根目錄
# 2. 推送到 main branch 即自動觸發部署
# 3. 部署完成後網址為：
#    https://你的群組或帳號.gitlab.io/QA_Tools
# ==========================================

pages:
  stage: deploy
  script:
    # 把根目錄所有檔案複製到 public 資料夾
    # GitLab Pages 固定從 public/ 目錄提供檔案
    - mkdir -p public
    - cp *.html public/
  artifacts:
    paths:
      - public
  rules:
    # 只有 push 到 main branch 才觸發部署
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: production
    url: https://$CI_PAGES_NAMESPACE.gitlab.io/$CI_PROJECT_NAME